# The workflow name is LOAD-BEARING: Story 5.4's release.yml triggers on
# `workflow_run` of "Quality Checks". Do not rename.
name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr-title:
    name: PR Title (Conventional Commits)
    # Dependency-free gate: squash-merge title must be a valid Conventional Commit.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$PR_TITLE" | grep -qE '^(feat|fix|docs|test|refactor|perf|build|ci|chore)(\(.+\))?!?: .+'; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(bucketing): add murmur hash'."
            echo "Got: $PR_TITLE"
            exit 1
          fi

  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: bundle exec rubocop

  typecheck:
    name: Typecheck (RBS + Steep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: bundle exec rbs validate
      - run: bundle exec steep check

  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.1"
          - "3.2"
          - "3.3"
          - "3.4"
          - "jruby"
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  gem-smoke:
    name: Gem Smoke (build + install + require)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - run: gem build convert_sdk.gemspec
      - run: gem install ./convert_sdk-*.gem
      - run: ruby -e "require 'convert_sdk'"
