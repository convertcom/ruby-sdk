# Builds the YARD API docs and deploys them to GitHub Pages (FR60).
#
# A Pages DEPLOY is NOT a PR gate, so this workflow triggers ONLY on push to the
# default branch and on manual dispatch — never on pull_request (which would add
# a spurious required check and attempt to deploy from a PR). The deployed docs
# are served at the gemspec `documentation_uri` (https://convertcom.github.io/ruby-sdk).
name: Pages (YARD API docs)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# GITHUB_TOKEN permissions required by the Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; never cancel an in-progress one (a half-done
# Pages deploy is worse than a queued one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build YARD docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Build YARD docs
        # .yardopts sets --output-dir doc and the public-surface options.
        run: bundle exec yard doc
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: doc

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
